<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4: Scores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h2 class="fw-bold mb-4">Student Scores</h2>
        <div id="scoreList" class="d-flex flex-column gap-2 mb-4 fs-5"></div>
        <p class="text-muted small mb-4" id="stats"></p>
        <div class="d-flex gap-2 justify-content-center">
            <input type="number" id="newScore" class="form-control" placeholder="New score">
            <button id="addBtn" class="btn btn-custom">Add score</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
