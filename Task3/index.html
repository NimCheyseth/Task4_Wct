<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3: Multi Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h2 class="fw-bold mb-4">Multiplication Table</h2>
        <div class="d-flex gap-2 justify-content-center mb-4">
            <input type="number" id="numInput" class="form-control" placeholder="Enter number">
            <button id="genBtn" class="btn btn-custom">Generate</button>
        </div>
        <table class="table table-bordered mb-0 d-none" id="tableWrapper">
            <thead class="table-dark">
                <tr><th>Expression</th><th>Result</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
