<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5: To-Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h2 class="fw-bold mb-4">My Tasks</h2>
        <div class="d-flex gap-2 justify-content-center mb-4">
            <input type="text" id="taskInput" class="form-control" placeholder="New task...">
            <button id="addBtn" class="btn btn-custom">Add</button>
        </div>
        <div id="taskList" class="text-start mb-3"></div>
        <p class="fw-bold text-muted small mb-0" id="counter">0 of 0 tasks done</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
